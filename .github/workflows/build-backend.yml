name: Build Backend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'src/**/*.sln'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - 'src/**/*.sln'

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/BindingChaos.sln

    - name: Build
      run: dotnet build src/BindingChaos.sln --no-restore --configuration Release

    - name: Unit tests
      run: |
        dotnet test src/BindingChaos.SharedKernel.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.CorePlatform.API.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.SignalAwareness.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.Ideation.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.CommunityDiscourse.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.Pseudonymity.Tests --no-build --configuration Release
        dotnet test src/BindingChaos.Tagging.Tests --no-build --configuration Release

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-unit-test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: bindingchaos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bindingchaos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/BindingChaos.sln

    - name: Build
      run: dotnet build src/BindingChaos.sln --no-restore --configuration Release

    - name: Integration tests
      run: dotnet test src/BindingChaos.CorePlatform.API.IntegrationTests --no-build --configuration Release
