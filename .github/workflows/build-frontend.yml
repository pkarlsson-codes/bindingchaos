name: Build Frontend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/BindingChaos.Web/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/BindingChaos.Web/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: src/BindingChaos.Web/package-lock.json

    - name: Install dependencies
      working-directory: src/BindingChaos.Web
      run: npm ci

    - name: Lint
      working-directory: src/BindingChaos.Web
      run: npm run lint

    - name: Test
      working-directory: src/BindingChaos.Web
      run: npm test -- --ci

    - name: Build
      working-directory: src/BindingChaos.Web
      run: npm run build
